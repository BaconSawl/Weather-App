<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="header">
        <h1>Some random header</h1>
    </div>

    <div class="citySearch">
        <input id="search-input" placeholder="Enter city name">
        <button class="btn" id="search-location">Search</button>
        <button class="btn" id="unit-toggle">°F / °C</button>
    </div>

    <div class="weather-container">
        
        <div class="weather">
            <img class="weather-icon" src="assets/weather-icon-placeholder.png">
            <h1 class="city">Ha Noi</h1>
            <h1 class="temp">30 °C</h1>
            <p class="weather-condition">Cloudy</p> <!-- Weather condition here-->

            <div class="weather-detail">
                <p class="humidity">89 %</p>
                <p class="apparent-temp">37 °C</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>Powered by Visual Crossing Weather</p>
    </div>


    <script src="script.js"></script>
</body>
</html>
